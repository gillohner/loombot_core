  meetup_erstellen:
    service: event_creator
    groups: false
    dms: true
    lock: false
    config:
      defaultTimezone: "Europe/Zurich"
      returnMessageTemplate: "Dein Event wurde genehmigt!\n{title}\n{date}, {time}\n\n{url}"
      requireLocation: false
      requireImage: false
      requireEndTime: false
      messageTtl: 0
      calendars:
