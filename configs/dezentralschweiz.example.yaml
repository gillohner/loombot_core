  # ===== Listeners =========================================================

  new_member:
    service: new_member
    groups: true
    dms: false
    lock: false
    # Chat admins can override this text per-chat via /config → Welcome message.
    config:
      message: "Hallo {display_name}! Willkommen im Dezentralschweiz Chat ({username}, {user_id})"
      mentionUser: true
      messageTtl: 0

  pocketethereum:
    service: triggerwords
    groups: true
    dms: false
    lock: false
    config:
      responseProbability: 1
      cooldownSeconds: 60
      replyToMessage: true
      messageTtl: 1
    datasets:
      triggers:
        version: "1.0.0"
        description: "pocket ethereum"
        entries:
          - enabled: true
            matchMode: "word"
            triggers:
              - "ethereum"
              - "ether"
              - "vitalik"
              - "buterin"
              - "solidity"
              - "etherium"
              - "ithirium"
              - "isirium"
              - "eserium"
              - "ethreum"
              - "ethirium"
              - "etherum"
              - "etheruem"
              - "eth"
            responses:
