# Dezentralschweiz bot
# Swiss bitcoin-only community. Merges the features from the three original
# bot configs (DM, Bitcoin group, Meetup-Chat) into one operator config.
# Chat admins customise per-chat via /config.
#
# Setup:
#   cp configs/dezentralschweiz.example.yaml config.yaml
#   cp .env.example .env.local
#   edit both, then:
#   deno task config:check
#   deno task dev

bot:
  # REQUIRED: your Telegram user id so /config works in DMs + any group.
  admin_ids: [784023144, 57066116, 979725167]
  lock_dm_config: false
  # Language for bot code-level strings (/config menu, service errors,
  # date formatting). Supported: en | de. The dezentralschweiz profile ships
  # German operator text (help, welcome, triggerwords, links) so this pairs
  # with `language: de` by default.
  language: de

pubky:
  # Required for /meetup_erstellen (event_creator publishes to Pubky).
  enabled: true
  recovery_file: ./secrets/dezentralschweiz.pkarr
  passphrase_env: PUBKY_PASSPHRASE
  # REQUIRED: Telegram chat id of the admin group where pending writes
  # get posted with Approve / Reject buttons.
  approval_group_chat_id: 0
  approval_timeout_hours: 24

features:
  # ===== Commands ==========================================================
  help:
    service: help
    groups: true
    dms: true
    lock: true
    config:
      message: "Um ein Meetup zu erstellen, kannst du mir eine DM mit /meetup_erstellen senden."
      messageTtl: 120
      showCommandList: true
      commands:
        - { command: "/meetups", description: "Anstehende Meetups" }
        - { command: "/links", description: "Links der Dezentralschweiz Community" }
        - { command: "/meetup_erstellen", description: "Meetup vorschlagen (nur DM)" }

  meetups:
    service: meetups
    groups: true
    dms: true
    lock: false
    # Chat admins can't add their own calendars here — the curated list below
    # is the canonical set of Dezentralschweiz community calendars. Chat
    # admins pick which of these are visible in their chat via /config.
    allow_external_calendars: false
    config:
      title: "Upcoming Events"
      nexusUrl: "https://nexus.eventky.app"
      eventkyBaseUrl: "https://eventky.app"
      maxEvents: 20
      messageTtl: 300
      timelineOptions: ["today", "week", "2weeks", "30days"]
      showCalendarTitle: true
      linkEvents: true
      disableLinkPreview: true
      # Periodic broadcast defaults. Every periodicXxx field is an operator
      # default that individual chat admins can override via
      # /config → 📣 Periodic broadcast (enable/disable, shift the day/hour,
      # change the timezone, switch the range, toggle pin behaviour, or send
      # a preview). Calendars are controlled separately under /config → Calendars.
      periodicEnabled: false
      periodicDay: 1
      periodicHour: 7
      periodicTimezone: "Europe/Zurich"
      periodicRange: "week"
      periodicPin: false
      periodicUnpinPrevious: false
      calendars:
        - id: dezentralschweiz
          name: "Dezentralschweiz"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034PXJ40MGQG"
        - id: bitcoin_alps
          name: "Bitcoin Alps"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034PXJPJCMMG"
        - id: einundzwanzig_ostschweiz
          name: "Einundzwanzig Meetup Ostschweiz"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034YTZZQZ0Y0"
        - id: bitcoin_luzern
          name: "Bitcoin Luzern"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034YV0E7Q1SG"
        - id: bitcoin_baden
          name: "Bitcoin Baden"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034YV0N2094G"
        - id: bitcoin_einsiedeln
          name: "Bitcoin Meetup Einsiedeln"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034YV0TNBQ80"
        - id: einezwaenzg_solothurn
          name: "Einezwänzg Solothurn"
          uri: "pubky://51da3n5m8s6oaq38uqs7jznp6ezbc3qbtmic8oy6fj3g6mokdyco/pub/eventky.app/calendars/0034YV0ZV6BR0"
        - id: einundzwanzig_thurgau
